[world]
name = "Tycoon"
description = "Tycoon game + rewards + TYC token (Dojo port of Solidity Tycoon.sol)"
# New seed = new world (Option A: avoid "Mismatch compiled class hash"). Your account will be OWNER.
seed = "tycoon_sepolia_v4"

[namespace]
default = "tycoon"

[env]
# rpc_url required in config (sozo unwraps it). Load secrets from .env.sepolia via migrate.sh
# If you see "Unhealthy RPC provider" or "error decoding response body", try swapping which line is active:
# rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
# rpc_url = "https://starknet-sepolia-rpc.publicnode.com"
rpc_url = "https://starknet-sepolia.public.blastapi.io"
# account_address and private_key from env: DOJO_ACCOUNT_ADDRESS, DOJO_PRIVATE_KEY
# Leave unset so sozo deploy a NEW world. After migrate, world address is in manifest_sepolia.json (world.address)
# world_address = "0x041167a2e9f249d46e52079a9eee47f75389801dd7e06fe933e275fde8fe742b"

