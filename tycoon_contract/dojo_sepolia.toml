[world]
name = "Tycoon"
description = "Tycoon game + rewards + TYC token (Dojo port of Solidity Tycoon.sol)"
# Use a unique seed so a NEW world is deployed and your account is OWNER (avoids "does NOT have OWNER role")
seed = "tycoon_sepolia"

[namespace]
default = "tycoon"

[env]
# rpc_url required in config (sozo unwraps it). Load secrets from .env.sepolia via migrate.sh
rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
# account_address and private_key from env: DOJO_ACCOUNT_ADDRESS, DOJO_PRIVATE_KEY
world_address = "0x041167a2e9f249d46e52079a9eee47f75389801dd7e06fe933e275fde8fe742b"

[writers]
"tycoon" = ["tycoon-game", "tycoon-player", "tycoon-reward", "tycoon-token"]
